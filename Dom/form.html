<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#" name="form" id="form" >
        Student Id: <br>
        <input type="id" name="id" class="form"> <br>
        Student Name: <br>
        <input type="text" name="name" class="form"> <br>
        Email: <br>
        <input type="email" name="email" class="form"> <br>
        Address: <br>
        <textarea  name="address" class="form"></textarea> <br>
        Round: 
        <select name="round" id="">
            <option name="round" value="70">70</option>
            <option name="round" value="71">71</option>
            <option name="round" value="72">72</option>
            <option name="round" value="73">73</option>
        </select> <br>
        Gender: 
        <input type="radio" name="gender"  value="Male">Male
        <input type="radio" name="gender"  value="Female">Female
        <input type="radio" name="gender" value="Other's">Other's
        <br>
        Subject: 
        <input type="checkbox" name="subject" value="SSC">SSC
        <input type="checkbox" name="subject" value="HSC">HSC
        <input type="checkbox" name="subject" value="Diploma">Diploma
        <input type="checkbox" name="subject" value="BSC">BSC
        <br>
        <input type="submit" value="Submit" onclick="info()" class="submit">
        <input type="reset" value="Reset" class="reset">

    </form>
    <script src="form.js"></script>
</body>
</html>
