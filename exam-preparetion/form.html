<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
             justify-content: center;
            align-items: center;
            background-color: rgb(246, 253, 255);
        }
        .form{
            background-color: rgb(213, 241, 232);
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="form">
        <fieldset>
            <form action="#" name="form">
                Name: <br>
                <input type="text" name="name"> <br> <br>
                Email: <br>
                <input type="text" name="email"> <br> <br>
                Password: <br>
                <input type="text" name="password"> <br><br>
                Round: <br>
                <select name="round" >
                    <option name="round" value="70">70</option>
                    <option name="round" value="71">71</option>
                    <option name="round" value="72">72</option>
                </select> <br> <br>
                Curse: <br>
                <input type="checkbox" name="curse" value="CSE">CSE
                <input type="checkbox" name="curse" value="BSC">BSC
                <input type="checkbox" name="curse" value="MSC">Msc
                <br> <br>
                <fieldset>
                    <legend>Gender</legend>
                    <input type="radio" name="gender" value="Male">Male
                    <input type="radio" name="gender" value="Female">Female
                </fieldset>
                <br>

                <input type="submit" value="Submit" onclick="return form_validation()">
                <input type="reset" value="Reset">





            </form>
        </fieldset>
    </div>
    <script src="form-validation.js"></script>
</body>
</html>
