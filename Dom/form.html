<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form</title>
</head>
<body>
    <form action="#" name="form">
        Student Id: <br>
        <input type="id" name="id"> <br>
        Student Name: <br>
        <input type="text" name="name"> <br>
        Email: <br>
        <input type="email" name="email"> <br>
        Address: <br>
        <textarea name="" id="" name="address"></textarea> <br>
        Round: 
        <select name="round" id="">
            <option name="round" value="70">70</option>
            <option name="round" value="71">71</option>
            <option name="round" value="72">72</option>
            <option name="round" value="73">73</option>
        </select> <br>
        Gender: 
        <input type="radio" name="gender"  value="Male">Male
        <input type="radio" name="gender"  value="Feale">Female
        <input type="radio" name="gender" value="Other'script">Other's
        <br>
        Subject: 
        <input type="checkbox" name="subject" value="SSC">SSC
        <input type="checkbox" name="subject" value="HSC">HSC
        <input type="checkbox" name="subject" value="Diploma">Diploma
        <input type="checkbox" name="subject" value="BSC">BSC
        <br>
        <input type="submit" value="Submit" onclick="info()">
        <input type="reset" value="Reset">

    </form>
    <script src="form.js"></script>
</body>
</html>
